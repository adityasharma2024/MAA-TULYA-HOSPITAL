<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/hosp_logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maa Tulya Hospital</title>

    <style>
      body { margin: 0; background-color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
      
      #loader-wrapper {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background-color: #ffffff;
        z-index: 9999;
        transition: opacity 0.4s ease-in-out;
      }

      .innovative-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      /* 1. THE DNA HELIX LOADER (Calculated via staggered delays) */
      .helix-loader {
        display: flex;
        gap: 6px;
        height: 40px;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        background-color: #3B3486; /* Brand Purple */
        border-radius: 50%;
        /* The Math: Using a Sine wave for vertical movement */
        animation: dnaWave 1.5s ease-in-out infinite;
      }

      /* Each dot is delayed to create the "Wave" math effect */
      .dot:nth-child(1) { animation-delay: 0.1s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.3s; background-color: #FFD700; } /* Gold Accent */
      .dot:nth-child(4) { animation-delay: 0.4s; }
      .dot:nth-child(5) { animation-delay: 0.5s; }
      .dot:nth-child(6) { animation-delay: 0.6s; background-color: #FFD700; }

      .logo-main {
        width: 100px;
        height: auto;
        /* Subtle entrance */
        animation: logoScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .loader-brand {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1.2rem;
        color: #3B3486;
        letter-spacing: 6px;
        text-transform: uppercase;
        position: relative;
      }

      /* 2. THE INNOVATIVE EXIT: "Expansion" */
      .fade-out {
        opacity: 0;
        transform: scale(1.1); /* Zoom effect for the website content behind it */
        pointer-events: none;
      }

      /* ANIMATIONS */
      @keyframes dnaWave {
        0%, 100% { transform: translateY(-15px); opacity: 0.3; }
        50% { transform: translateY(15px); opacity: 1; }
      }

      @keyframes logoScale {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

    </style>
  </head>
  <body>
    <div id="loader-wrapper">
      <div class="innovative-container">
        <img src="/hosp_logo.png" alt="Maa Tulya" class="logo-main">

        <div class="helix-loader">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div class="loader-brand">Maa Tulya</div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // 3. ULTRA-FAST LOADING SCRIPT
      // We use 'DOMContentLoaded' instead of 'load' to fire as soon as HTML is ready
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('loader-wrapper');
        
        // 400ms is the "sweet spot" - fast enough to not annoy, long enough to brand
        setTimeout(() => { 
          loader.classList.add('fade-out'); 
          document.body.style.overflow = 'visible';
        }, 400); 
      });
    </script>
  </body>
</html>
